# Portainer stack for the Neuron View TSL bulk-config CLI.
#
# Deploy this in Portainer as a Git-backed stack:
#   Stacks -> Add stack -> Repository
#   Repository URL: https://github.com/YOUR_USER/neuron-tsl-bulk
#   Compose path:   docker-compose.yml
#
# The container stays running idle. To use the tool, open the container's Console in
# Portainer (or `docker exec -it neuron-tsl-bulk sh`) and run, targeting any board:
#   node cli.js dump --ip 10.0.0.42 --group 1
#   node cli.js copy --ip 10.0.0.42 --targets 2-36           (dry run)
#   node cli.js copy --ip 10.0.0.42 --targets 2-36 --apply   (writes)
#
# Nothing board-specific lives here — the board is chosen with --ip at run time.
#
# Networking matches the existing Companion / neuron-* pattern: a macvlan network gives
# the container its own LAN IP so it can reach the boards. If you already have a shared
# external macvlan network, replace the networks block with:
#     networks:
#       lan:
#         external: true
#         name: <your-existing-macvlan-net>
# and delete the driver/ipam definition at the bottom.

services:
  neuron-tsl-bulk:
    build: .
    image: neuron-tsl-bulk:latest
    pull_policy: never
    container_name: neuron-tsl-bulk
    restart: unless-stopped
    networks:
      lan:
        ipv4_address: 10.0.0.60      # <-- a free LAN IP for this container

networks:
  lan:
    driver: macvlan
    driver_opts:
      parent: eth0                   # <-- your host's LAN interface
    ipam:
      config:
        - subnet: 10.0.0.0/24        # <-- your LAN subnet
          gateway: 10.0.0.1          # <-- your LAN gateway
